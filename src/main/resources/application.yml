spring:
  jackson:
    time-zone: Asia/Shanghai
  application:
    name: dailw
  cache:
    type: redis
    redis:
      cache-null-values: false
  mvc:
    pathmatch:
      matching-strategy: path-pattern-parser
  profiles:
    active: local  # 默认激活开发环境
  kafka:
    # bootstrap-servers 按环境在 application-*.yml 中分别配置
    producer:
      retries: 3
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      batch-size: 16384
      buffer-memory: 33554432
      properties:
        linger.ms: 5
    consumer:
      group-id: judge-group
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      max-poll-interval-ms: 600000
    listener:
      concurrency: 3
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
      enabled: true

# 公共服务器配置
server:
  servlet:
    context-path: /dailw

# CORS配置 - 公共默认值，各环境可覆盖
cors:
  allowed-origins: http://localhost:5173

springdoc:
  api-docs:
    path: /v3/api-docs
    version: OPENAPI_3_0
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.dailw.controller

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# JWT配置 - 公共配置
jwt:
  issuer: dailw-system

# 文件上传配置
file:
  upload:
    avatar:
      path: ./uploads/avatar/
      url-prefix: uploads/avatar/
      # 允许的文件扩展名
      allowed-extensions: jpg,jpeg,png,gif,bmp,webp
      # 允许的MIME类型
      allowed-mime-types: image/jpeg,image/png,image/gif,image/bmp,image/webp
      # 最大文件大小（字节）
      max-file-size: 5242880

# 登录限流配置
rate-limit:
  login:
    max-attempts: 10
    window-seconds: 60

# 代码沙箱配置
dailw:
  codesandbox:
    url: http://10.73.128.27:9119/judge

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: D-ojbe
  prometheus:
    metrics:
      export:
        enabled: true