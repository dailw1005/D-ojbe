spring:
  application:
    name: dailw
  mvc:
    pathmatch:
      matching-strategy: path-pattern-parser
  profiles:
    active: dev  # 默认激活开发环境
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
      enabled: true

# 公共服务器配置
server:
  servlet:
    context-path: /dailw

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.dailw.controller

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# JWT配置 - 公共配置
jwt:
  issuer: dailw-system

# 文件上传配置
file:
  upload:
    avatar:
      path: D:\JetBrains\IdeaProjects\study\dailw\uploads\avatar
      url-prefix: uploads/avatar/
      # 允许的文件扩展名
      allowed-extensions: jpg,jpeg,png,gif,bmp,webp
      # 允许的MIME类型
      allowed-mime-types: image/jpeg,image/png,image/gif,image/bmp,image/webp
      # 最大文件大小（字节）
      max-file-size: 5242880
  